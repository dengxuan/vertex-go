name: Tests

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for Go module
        id: haveCode
        run: |
          if [ -f go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod yet — skipping vet/test. This is expected during initial bootstrap."
          fi

      - uses: actions/setup-go@v5
        if: steps.haveCode.outputs.present == 'true'
        with:
          go-version: '1.22'

      - name: Tidy check
        if: steps.haveCode.outputs.present == 'true'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum drift"; exit 1)

      - name: Vet
        if: steps.haveCode.outputs.present == 'true'
        run: go vet ./...

      - name: Test
        if: steps.haveCode.outputs.present == 'true'
        run: go test -race -cover ./...
