name: Tests

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for Go module
        id: haveCode
        run: |
          if [ -f go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod yet — skipping vet/test. This is expected during initial bootstrap."
          fi

      - uses: actions/setup-go@v5
        if: steps.haveCode.outputs.present == 'true'
        with:
          go-version: '1.22'

      - name: Verify vendored protos match pinned spec SHA
        if: steps.haveCode.outputs.present == 'true'
        run: |
          # --check-only skips protoc regeneration. Generated .pb.go files embed
          # the local protoc + protoc-gen-go versions in their header comments,
          # which drift between CI and dev machines and false-positive this check.
          # We trust devs to run `bash scripts/sync-protos.sh` (without the flag)
          # locally whenever they bump scripts/.spec-ref; CI only guards that the
          # vendored .proto file tracks the pinned spec SHA.
          bash scripts/sync-protos.sh --check-only
          if ! git diff --quiet --exit-code -- protos; then
            echo "::error::Vendored .proto drifted from pinned spec SHA."
            echo "Run bash scripts/sync-protos.sh locally and commit; update scripts/.spec-ref if a spec bump is intended."
            git diff -- protos
            exit 1
          fi

      - name: Tidy check
        if: steps.haveCode.outputs.present == 'true'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum drift"; exit 1)

      - name: Vet
        if: steps.haveCode.outputs.present == 'true'
        run: go vet ./...

      - name: Test
        if: steps.haveCode.outputs.present == 'true'
        run: go test -race -cover ./...
