name: Tests

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for Go module
        id: haveCode
        run: |
          if [ -f go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod yet — skipping vet/test. This is expected during initial bootstrap."
          fi

      - uses: actions/setup-go@v5
        if: steps.haveCode.outputs.present == 'true'
        with:
          go-version: '1.22'

      - name: Install protoc + Go plugins
        if: steps.haveCode.outputs.present == 'true'
        uses: arduino/setup-protoc@v3
        with:
          version: '28.3'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc-gen-go plugins
        if: steps.haveCode.outputs.present == 'true'
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify vendored protos + generated Go match pinned spec SHA
        if: steps.haveCode.outputs.present == 'true'
        run: |
          ./scripts/sync-protos.sh
          if ! git diff --quiet --exit-code -- protos transport/grpc/protocol; then
            echo "::error::Vendored protos or generated Go drifted from pinned spec SHA."
            echo "Run scripts/sync-protos.sh locally and commit the result, or update scripts/.spec-ref if a spec bump is intended."
            git diff -- protos transport/grpc/protocol
            exit 1
          fi

      - name: Tidy check
        if: steps.haveCode.outputs.present == 'true'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum drift"; exit 1)

      - name: Vet
        if: steps.haveCode.outputs.present == 'true'
        run: go vet ./...

      - name: Test
        if: steps.haveCode.outputs.present == 'true'
        run: go test -race -cover ./...
